<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBS Production Manager V10.5 - Compact Inputs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .mode-dowel { --brand-primary: #2563eb; --brand-dark: #1e293b; }
        .mode-dovetail { --brand-primary: #d97706; --brand-dark: #451a03; }
        .brand-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        
        .input-group label { @apply block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider; }
        .input-group input, .input-group select { @apply border border-slate-300 rounded p-2 w-full bg-yellow-50 focus:bg-white outline-none transition-all text-sm; }
        
        /* V10.5 RIGID LAYOUT FIX: Prevents Arm inputs from extending out */
        .arm-container { display: flex; justify-content: space-between; width: 100%; gap: 4%; }
        .arm-item { width: 48%; }
        .arm-item input { width: 100% !important; min-width: 0 !important; }

        #preview-svg { display: none; }
        .is-live #preview-svg { display: block; }
        .is-live #static-reference { display: none; }

        @media print {
            @page { size: landscape; margin: 3mm; }
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            #print-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .item-container { border: 3px solid #000; padding: 0px; height: 48.5vh; page-break-inside: avoid; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow: hidden; background: #fff; }
            svg { width: 100% !important; height: 100% !important; max-height: none !important; margin: 0 !important; }
            .print-header { width: 100%; border-bottom: 2px solid #000; padding: 2px 8px; font-size: 14px; font-weight: 900; display: flex; justify-content: space-between; background: #fff; }
            .print-sub { font-size: 11px; font-weight: bold; width: 100%; text-align: center; padding: 2px 0; border-bottom: 1px solid #000; background: #fff; }
        }
    </style>
</head>
<body id="main-body" class="p-4 md:p-8 mode-dovetail">

    <div class="max-w-7xl mx-auto no-print">
        <div class="bg-white p-6 rounded-t-xl brand-shadow border-l-8 border-slate-900 flex justify-between items-center mb-6">
            <div class="flex items-center gap-6">
                <div class="h-16 w-32 bg-slate-900 rounded flex items-center justify-center p-2 text-white font-black italic text-2xl uppercase">DBS</div>
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none">U-Shape Calculator</h1>
                    <p class="text-xs font-bold text-slate-400 tracking-widest uppercase mt-1">V10.5 - Input Width Correction</p>
                </div>
            </div>
            <div id="status-chip" class="px-4 py-2 bg-orange-50 border border-orange-200 text-orange-700 text-[10px] font-black uppercase rounded-lg tracking-widest">
                Active: Dovetail
            </div>
        </div>

        <div id="header-bar" class="bg-orange-950 p-4 text-white flex justify-between items-center rounded-b-xl shadow-lg mb-8 border-t border-orange-800">
            <h1 id="header-title" class="text-sm font-bold tracking-widest uppercase opacity-75">Dovetail Mode</h1>
            <div class="flex gap-4">
                <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded text-xs font-bold uppercase tracking-widest shadow-lg">Print Queue</button>
                <button onclick="clearQueue()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-xs font-bold uppercase tracking-widest shadow-lg">Clear All</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest border-b pb-2">Construction Mode</h2>
                    <div class="bg-slate-100 p-1 rounded-lg border flex gap-1 mb-6 shadow-inner">
                        <button id="btn-dovetail" onclick="setMode('dovetail')" class="flex-1 py-2 rounded-md text-[10px] font-black uppercase transition-all bg-orange-600 text-white shadow-sm">Dovetail</button>
                        <button id="btn-dowel" onclick="setMode('dowel')" class="flex-1 py-2 rounded-md text-[10px] font-black uppercase transition-all text-slate-500 hover:text-slate-700">Dowel</button>
                    </div>

                    <div id="entry-form" class="flex flex-col gap-4">
                        <div class="input-group"><label>Line Label</label><input type="text" id="label" placeholder="e.g. Unit 1" oninput="validateInput()"></div>
                        <div class="input-group"><label>Qty*</label><input type="number" id="qty" placeholder="1" oninput="validateInput()"></div>
                        <div class="input-group"><label>Thickness</label>
                            <select id="thick" onchange="validateInput()">
                                <option value="0.500">1/2" (0.500)</option>
                                <option value="0.625">5/8" (0.625)</option>
                                <option value="0.472">12mm (0.472)</option>
                                <option value="0.750">3/4" (0.750)</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Box Width (W)*</label><input type="number" id="width" placeholder="0.000" oninput="validateInput()"></div>
                        <div class="input-group"><label>Box Depth (D)*</label><input type="number" id="depth" placeholder="0.000" oninput="validateInput()"></div>
                        <div class="input-group"><label>Box Height (H)*</label><input type="number" id="height" placeholder="0.000" oninput="validateInput()"></div>
                        
                        <div class="border-t pt-4">
                            <div class="input-group"><label>U-Shape Pocket Depth*</label><input type="number" id="uDepth" placeholder="0.000" oninput="validateInput()"></div>
                            
                            <div class="arm-container mt-4">
                                <div class="arm-item input-group">
                                    <label>Left Arm*</label>
                                    <input type="number" id="lArm" placeholder="0.000" oninput="validateInput()">
                                </div>
                                <div class="arm-item input-group">
                                    <label>Right Arm*</label>
                                    <input type="number" id="rArm" placeholder="0.000" oninput="validateInput()">
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 mt-4">
                            <button id="add-btn" onclick="addToQueue()" class="w-full bg-slate-300 text-white font-bold py-4 rounded shadow uppercase tracking-widest text-xs cursor-not-allowed" disabled>Add to Queue</button>
                            <button onclick="resetForm()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold py-2 rounded transition-all uppercase tracking-widest text-[10px]">Manual Clear Form</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9 space-y-6">
                <div id="preview-card" class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 flex flex-col items-center">
                    <h2 class="w-full text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest border-b pb-2 text-left">Blueprint Preview</h2>
                    <div id="display-frame" class="w-full h-[450px] bg-slate-50 rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-slate-200 relative overflow-hidden text-center">
                        <div id="static-reference" class="flex flex-col items-center justify-center opacity-40 grayscale">
                            <svg viewBox="0 0 500 400" width="300" height="240">
                                <path d="M 100 100 L 200 100 L 200 150 L 300 150 L 300 100 L 400 100 L 400 300 L 100 300 Z" fill="#dec19e" stroke="#000" stroke-width="2" />
                            </svg>
                        </div>
                        <svg id="preview-svg" viewBox="0 0 500 400" class="w-full h-auto max-h-full"></svg>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest border-b pb-2">Active Production Queue</h2>
                    <div id="queue-list" class="space-y-2 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="print-container" class="hidden print-area"><div id="print-items"></div></div>

    <script>
        let queue = [];
        let currentMode = 'dovetail';

        function validateInput() {
            const numericFields = ['qty', 'width', 'depth', 'height', 'uDepth', 'lArm', 'rArm'];
            const frame = document.getElementById('display-frame');
            const addBtn = document.getElementById('add-btn');
            let isComplete = true;
            numericFields.forEach(id => {
                const val = document.getElementById(id).value;
                if (val === "" || parseFloat(val) <= 0 || isNaN(val)) isComplete = false;
            });
            if (isComplete) {
                frame.classList.add('is-live');
                const accent = currentMode === 'dovetail' ? 'bg-orange-600 hover:bg-orange-700' : 'bg-blue-600 hover:bg-blue-700';
                addBtn.className = `w-full ${accent} text-white font-bold py-4 rounded shadow-lg transition-all uppercase tracking-widest text-xs cursor-pointer`;
                addBtn.disabled = false;
                updatePreview();
            } else {
                frame.classList.remove('is-live');
                addBtn.className = "w-full bg-slate-300 text-white font-bold py-4 rounded shadow uppercase tracking-widest text-xs cursor-not-allowed";
                addBtn.disabled = true;
            }
        }

        function resetForm() {
            const inputs = document.querySelectorAll('#entry-form input');
            inputs.forEach(i => i.value = "");
            document.getElementById('thick').selectedIndex = 0;
            document.getElementById('display-frame').classList.remove('is-live');
            validateInput();
        }

        function setMode(mode) {
            currentMode = mode;
            const body = document.getElementById('main-body');
            const header = document.getElementById('header-bar');
            const title = document.getElementById('header-title');
            const chip = document.getElementById('status-chip');
            const btnDovetail = document.getElementById('btn-dovetail');
            const btnDowel = document.getElementById('btn-dowel');
            resetForm(); 
            if (mode === 'dovetail') {
                body.className = 'p-4 md:p-8 mode-dovetail';
                header.className = 'bg-orange-950 p-4 text-white flex justify-between items-center rounded-b-xl shadow-lg border-t border-orange-800';
                title.textContent = 'Dovetail Mode';
                chip.textContent = 'Active: Dovetail';
                chip.className = 'px-4 py-2 bg-orange-50 border border-orange-200 text-orange-700 text-[10px] font-black uppercase rounded-lg tracking-widest';
                btnDovetail.className = 'flex-1 py-2 rounded-md text-[10px] font-black uppercase transition-all bg-orange-600 text-white shadow-sm';
                btnDowel.className = 'flex-1 py-2 rounded-md text-[10px] font-black uppercase transition-all text-slate-500 hover:text-slate-700';
            } else {
                body.className = 'p-4 md:p-8 mode-dowel';
                header.className = 'bg-slate-800 p-4 text-white flex justify-between items-center rounded-b-xl shadow-lg border-t border-blue-800';
                title.textContent = 'Dowel Mode';
                chip.textContent = 'Active: Dowel';
                chip.className = 'px-4 py-2 bg-blue-50 border border-blue-200 text-blue-700 text-[10px] font-black uppercase rounded-lg tracking-widest';
                btnDowel.className = 'flex-1 py-2 rounded-md text-[10px] font-black uppercase transition-all bg-blue-600 text-white shadow-sm';
                btnDovetail.className = 'flex-1 py-2 rounded-md text-[10px] font-black uppercase transition-all text-slate-500 hover:text-slate-700';
            }
            validateInput();
        }

        function getDeduction(thickness) {
            if (thickness === 0.625) return 0.624; 
            if (thickness === 0.500) return 0.374; 
            if (thickness === 0.472) return 0.318; 
            return thickness;
        }

        function generateSVG(data, svgId, showWood, itemMode) {
            const svg = document.getElementById(svgId);
            const t = parseFloat(data.t); 
            const w = parseFloat(data.width); 
            const d = parseFloat(data.depth); 
            const h = parseFloat(data.height);
            const deduction = getDeduction(t);

            let sideLen, backWidth, udDisplay, dLA, dRA;
            const laVal = parseFloat(data.lArm);
            const raVal = parseFloat(data.rArm);
            const udRaw = parseFloat(data.uDepth) || 0;

            if (itemMode === 'dovetail') {
                sideLen = d - deduction;
                backWidth = w;
                udDisplay = udRaw + t - deduction;
                dLA = laVal; dRA = raVal;
            } else {
                sideLen = d;
                backWidth = w - (2*t);
                udDisplay = udRaw + t;
                dLA = laVal - (2*t); dRA = raVal - (2*t);
            }

            const gap = w - (laVal + raVal);
            const isPrint = svgId.includes('svg-p');
            const hMargin = isPrint ? 35 : 85; 
            const vMargin = isPrint ? 50 : 85; 

            const scale = Math.min((500 - hMargin * 2) / w, (400 - vMargin * 2) / d);
            const dW = w * scale; const dD = d * scale; 
            const sLA = dLA * scale; const sRA = dRA * scale;
            const sUD = udDisplay * scale;
            const x0 = (500 - dW) / 2; const y0 = (400 - dD) / 2;

            const path = `M ${x0} ${y0} L ${x0+sLA} ${y0} L ${x0+sLA} ${y0+sUD} L ${x0+dW-sRA} ${y0+sUD} L ${x0+dW-sRA} ${y0} L ${x0+dW} ${y0} L ${x0+dW} ${y0+dD} L ${x0} ${y0+dD} Z`;

            const woodBottomY = y0 + dD;
            const notchBottomY = y0 + sUD;
            const remainingWoodHeight = woodBottomY - notchBottomY;
            const labelCenterY = notchBottomY + (remainingWoodHeight / 2);
            const textX = x0 + dW / 2;
            const widthLineY = notchBottomY + 8;
            const widthTextY = widthLineY + 15;

            svg.innerHTML = `
                <defs>
                    <marker id="m-s-${svgId}" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#000"/></marker>
                    <marker id="m-e-${svgId}" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#000"/></marker>
                </defs>
                <path d="${path}" fill="${showWood ? '#dec19e' : 'none'}" stroke="#000" stroke-width="2" />
                <text x="${textX}" y="${labelCenterY + 10}" text-anchor="middle" font-weight="900" font-size="14" class="uppercase fill-slate-900">${data.label}</text>
                <text x="${textX}" y="${labelCenterY + 24}" text-anchor="middle" font-weight="bold" font-size="12" fill="#2563eb">QTY: ${data.qty}</text>
                <text x="${textX}" y="${labelCenterY + 38}" text-anchor="middle" font-weight="bold" font-size="12" fill="#1e40af">H: ${h.toFixed(3)}</text>
                
                <line x1="${x0-35}" y1="${y0}" x2="${x0-35}" y2="${y0+dD}" stroke="#000" marker-start="url(#m-s-${svgId})" marker-end="url(#m-e-${svgId})" />
                <text x="${x0-50}" y="${y0+dD/2}" text-anchor="middle" font-weight="bold" font-size="16" fill="${itemMode==='dovetail'?'#c026d3':'#000'}" transform="rotate(-90, ${x0-50}, ${y0+dD/2})">${sideLen.toFixed(3)}</text>
                
                <line x1="${x0}" y1="${y0+dD+25}" x2="${x0+dW}" y2="${y0+dD+25}" stroke="#000" marker-start="url(#m-s-${svgId})" marker-end="url(#m-e-${svgId})" />
                <text x="${x0+dW/2}" y="${y0+dD+45}" text-anchor="middle" font-weight="900" font-size="20" fill="${itemMode==='dovetail'?'#c2410c':'#1e40af'}">${backWidth.toFixed(3)}</text>
                
                <line x1="${x0}" y1="${y0-25}" x2="${x0+sLA}" y2="${y0-25}" stroke="#000" marker-start="url(#m-s-${svgId})" marker-end="url(#m-e-${svgId})" />
                <text x="${x0+sLA/2}" y="${y0-35}" text-anchor="middle" font-size="14" font-weight="bold">${dLA.toFixed(3)}</text>
                <line x1="${x0+dW-sRA}" y1="${y0-25}" x2="${x0+dW}" y2="${y0-25}" stroke="#000" marker-start="url(#m-s-${svgId})" marker-end="url(#m-e-${svgId})" />
                <text x="${x0+dW-sRA/2}" y="${y0-35}" text-anchor="middle" font-size="14" font-weight="bold">${dRA.toFixed(3)}</text>
                
                <line x1="${x0+sLA+12}" y1="${y0}" x2="${x0+sLA+12}" y2="${notchBottomY}" stroke="#000" marker-start="url(#m-s-${svgId})" marker-end="url(#m-e-${svgId})" />
                <text x="${x0+sLA+18}" y="${y0+(sUD/2)}" text-anchor="start" font-size="14" font-weight="bold" fill="red">${udDisplay.toFixed(3)}</text>
                
                <line x1="${x0+sLA}" y1="${widthLineY}" x2="${x0+dW-sRA}" y2="${widthLineY}" stroke="#000" marker-start="url(#m-s-${svgId})" marker-end="url(#m-e-${svgId})" />
                <text x="${x0+sLA+(gap*scale)/2}" y="${widthTextY}" text-anchor="middle" font-weight="bold" fill="red" font-size="18">${gap.toFixed(3)}</text>
                
                <text x="${x0+dW}" y="${y0+dD-5}" text-anchor="end" font-size="10" font-weight="bold">T = ${t.toFixed(3)}</text>
            `;
        }

        function updatePreview() {
            const data = {
                label: document.getElementById('label').value || "Unit",
                qty: document.getElementById('qty').value,
                t: parseFloat(document.getElementById('thick').value),
                width: document.getElementById('width').value,
                depth: document.getElementById('depth').value,
                height: document.getElementById('height').value,
                uDepth: document.getElementById('uDepth').value,
                lArm: document.getElementById('lArm').value,
                rArm: document.getElementById('rArm').value
            };
            generateSVG(data, 'preview-svg', true, currentMode);
        }

        function addToQueue() {
            const sel = document.getElementById('thick');
            const item = {
                id: Date.now(), mode: currentMode,
                label: document.getElementById('label').value || 'Unit',
                qty: document.getElementById('qty').value,
                t: parseFloat(sel.value), tName: sel.options[sel.selectedIndex].text,
                width: document.getElementById('width').value,
                depth: document.getElementById('depth').value,
                height: document.getElementById('height').value,
                uDepth: document.getElementById('uDepth').value,
                lArm: document.getElementById('lArm').value,
                rArm: document.getElementById('rArm').value
            };
            queue.push(item); renderQueue();
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const printList = document.getElementById('print-items');
            list.innerHTML = ''; printList.innerHTML = '';
            queue.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center p-3 bg-slate-50 rounded border text-sm shadow-sm";
                row.innerHTML = `<b>${index+1}. ${item.label} (${item.mode.toUpperCase()})</b> <button onclick="removeItem(${item.id})" class="text-red-600 font-bold uppercase text-[10px] hover:underline">Delete</button>`;
                list.appendChild(row);
                const container = document.createElement('div');
                container.className = "item-container";
                container.innerHTML = `
                    <div class="print-header">
                        <span>#${index+1} ${item.label} (${item.mode.toUpperCase()})</span>
                        <span style="color: #000;">QTY: ${item.qty}</span>
                    </div>
                    <div class="print-sub">
                        W: ${item.width} | D: ${item.depth} | H: ${item.height}
                    </div>
                    <svg id="svg-p-${item.id}" viewBox="0 0 500 400"></svg>`;
                printList.appendChild(container);
                generateSVG(item, `svg-p-${item.id}`, false, item.mode);
            });
        }

        function removeItem(id) { queue = queue.filter(i => i.id !== id); renderQueue(); }
        function clearQueue() { if(confirm("Clear order?")) { queue = []; renderQueue(); } }
        window.onload = validateInput;
    </script>
</body>
</html>
